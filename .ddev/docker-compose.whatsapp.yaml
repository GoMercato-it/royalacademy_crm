services:
  whatsapp-api:
    container_name: ddev-${DDEV_SITENAME}-whatsapp-api
    image: royalacademy-crm-whatsapp-api:local
    build:
      context: ../docker/whatsapp-api
      dockerfile: Dockerfile
      args:
        WWEBJS_API_REF: 31e94123016757adcaa1a8aeca514695ee1f722d
        WHATSAPP_WEB_JS_REF: b0a4b6c6c10868fad4881fb484b97895ce898b5d
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      - API_KEY=espocrm-secret-key
      # Internal-only webhook contract: the bridge must call the CRM
      # through the internal Docker service address, not the public domain.
      - BASE_WEBHOOK_URL=http://web/api/v1/WhatsApp/action/webhook
      # Keep the bridge focused on chat messages. The CRM does not consume
      # these noisy startup/history callbacks, and they slow down first sync.
      - DISABLED_CALLBACKS=auth_failure|authenticated|change_state|disconnected|loading_screen|qr|ready|call|group_join|group_leave|group_admin_changed|group_membership_request|group_update|media_uploaded|media|message_ack|message_reaction|message_edit|message_ciphertext|message_revoke_everyone|message_revoke_me|contact_changed|chat_removed|chat_archived|unread_count|vote_update|code
      - MAX_ATTACHMENT_SIZE=10000000
      - ENABLE_LOCAL_CALLBACK_EXAMPLE=FALSE
      - VIRTUAL_HOST=$DDEV_HOSTNAME
      - HTTP_EXPOSE=3000:3000
    volumes:
      - whatsapp-sessions:/usr/src/app/sessions
      - whatsapp-cache:/usr/src/app/.wwebjs_cache
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: $DDEV_APPROOT

volumes:
  whatsapp-sessions:
  whatsapp-cache:
